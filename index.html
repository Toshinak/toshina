<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bienvenido! | Toshinak</title>

<link rel="icon" href="toshi.jpg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: black;
    color: #ff3b3b;
    overflow-x: hidden;
}

/* FONDO ROJO ANIMADO */
#bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #ff0000, #330000, #990000);
    background-size: 400% 400%;
    animation: bgMove 8s infinite alternate;
    z-index: -2;
}

@keyframes bgMove {
    0% { background-position: left; }
    100% { background-position: right; }
}

/* GRID */
.grid {
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        transparent,
        transparent 40px,
        rgba(255,0,0,0.2) 41px
    ),
    repeating-linear-gradient(
        90deg,
        transparent,
        transparent 40px,
        rgba(255,0,0,0.2) 41px
    );
    z-index: -1;
}

/* CONTENEDOR */
.container {
    max-width: 500px;
    margin: 50px auto;
    background: black;
    padding: 25px;
    border: 3px solid #ff0000;
    box-shadow: 0 0 20px #ff0000, 0 0 40px #990000;
    text-align: center;
}

/* TITULO */
h1 {
    color: #ff0000;
    text-shadow: 0 0 10px #ff0000, 0 0 25px #ff0000;
}

/* FOTO */
.profile-pic {
    border-radius: 50%;
    border: 3px solid #ff0000;
    box-shadow: 0 0 15px #ff0000;
    width: 120px;
}

/* INFO */
.info {
    text-align: left;
    font-size: 10px;
}

.info p {
    border-bottom: 1px solid rgba(255,0,0,0.3);
    padding: 5px 0;
}

/* GALERIA */
.gallery-section {
    margin-top: 20px;
}

.btn-year {
    background: black;
    color: #ff3b3b;
    border: 2px solid #ff0000;
    padding: 5px;
    margin: 3px;
    cursor: pointer;
    font-size: 8px;
}

.btn-year:hover {
    background: #ff0000;
    color: black;
    box-shadow: 0 0 10px #ff0000;
}

.photo-display {
    margin-top: 10px;
    height: 200px;
    border: 2px solid #ff0000;
    display: flex;
    justify-content: center;
    align-items: center;
}

.photo-display img {
    max-width: 100%;
    max-height: 100%;
    display: none;
}

.photo-display img.active {
    display: block;
}

/* REDES */
.social-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    margin-top: 20px;
}

.social-icon {
    color: #ff3b3b;
    text-decoration: none;
    font-size: 18px;
}

.social-icon:hover {
    color: #ff0000;
    text-shadow: 0 0 10px #ff0000;
}

/* SCANLINES */
.scanlines {
    pointer-events: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0.4) 0px,
        rgba(0,0,0,0.4) 2px,
        transparent 2px,
        transparent 4px
    );
    z-index: 999;
}

</style>
</head>

<body>

<div id="bg"></div>
<div class="grid"></div>
<div class="scanlines"></div>

<div class="container">

<h1>TOSHINAK</h1>

<img src="XDDD1.jpg" class="profile-pic">

<div class="info">
<p>👤 Nombre: Toshiro</p>
<p>🎂 Edad: 16</p>
<p>📅 Nacimiento: 2010</p>
<p>🌎 Peruano</p>
<p>👾 Discord: toshinak - toshironak (2017) </p>
<p>🎮 Juegos: L4D2 / GMod / Minecraft</p>
</div>

<div class="gallery-section">
<h3>📸 ARCHIVOS</h3>

<button class="btn-year" onclick="showPhoto('2016')">2016</button>
<button class="btn-year" onclick="showPhoto('2017')">2017</button>
<button class="btn-year" onclick="showPhoto('2018')">2018</button>
<button class="btn-year" onclick="showPhoto('2019')">2019</button>
<button class="btn-year" onclick="showPhoto('2020')">2020</button>
<button class="btn-year" onclick="showPhoto('2021')">2021</button>
<button class="btn-year" onclick="showPhoto('2022')">2022</button>

<div class="photo-display">
<img id="img-2016" src="2016.jpg">
<img id="img-2017" src="2017.jpg">
<img id="img-2018" src="baldiXD.jpg">
<img id="img-2019" src="2019.jpg">
<img id="img-2020" src="Capture0.jpg">
<img id="img-2021" src="Capture0 (1).jpg">
<img id="img-2022" src="foto2022.jpg">
</div>

</div>

<div class="social-grid">
<a href="https://youtube.com" class="social-icon"><i class="fab fa-youtube"></i></a>
<a href="https://x.com" class="social-icon"><i class="fab fa-x-twitter"></i></a>
<a href="https://www.instagram.com/toshironakaval" class="social-icon"><i class="fab fa-instagram"></i></a>
<a href="https://www.roblox.com/es/users/314252969/profile" class="social-icon"><i class="fas fa-gamepad"></i></a>
<a href="https://es.namemc.com/profile/Toshiperu.1" class="social-icon"><i class="fas fa-cube"></i></a>
<a href="https://steamcommunity.com/id/ToshiTuber_XD/" class="social-icon"><i class="fab fa-steam"></i></a>
</div>

</div>

<script>

function showPhoto(year) {
    const images = document.querySelectorAll('.photo-display img');
    images.forEach(img => img.classList.remove('active'));

    const selected = document.getElementById('img-' + year);
    if(selected) selected.classList.add('active');
}

/* SONIDO */
document.addEventListener("click", () => {
    const audio = new Audio("https://www.myinstants.com/media/sounds/click.mp3");
    audio.volume = 0.2;
    audio.play();
});

</script>

</body>
</html>
